<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SosiConnect Map</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { height: 100vh; width: 100%; }
    </style>
</head>
<body>

<div id="map"></div>

<script>
    // Initialize map centered on Tunis by default
    var map = L.map('map').setView([36.8065, 10.1815], 13);
    var markersLayer = L.layerGroup().addTo(map);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    function clearMarkers() {
        markersLayer.clearLayers();
    }

    // Expected JSON format: [{"name": "Pharmacie X", "lat": 36.8, "lng": 10.1, "type": "Pharmacie"}, ...]
    function loadMarkers(jsonString) {
        clearMarkers();
        try {
            var locations = JSON.parse(jsonString);
            if (locations.length === 0) return;

            var bounds = [];
            locations.forEach(function(loc) {
                var colorIcon = loc.type === "Urgence" ? "red" : "blue"; // Simple color logic can be expanded
                var marker = L.marker([loc.lat, loc.lng]).addTo(markersLayer)
                    .bindPopup("<b>" + loc.name + "</b><br>" + loc.type);
                bounds.push([loc.lat, loc.lng]);
            });

            if (bounds.length > 0) {
                map.fitBounds(bounds, { padding: [50, 50] }); // Dynamically center
            }
        } catch(e) {
            console.error("Failed to load markers: " + e);
        }
    }
</script>

</body>
</html>
