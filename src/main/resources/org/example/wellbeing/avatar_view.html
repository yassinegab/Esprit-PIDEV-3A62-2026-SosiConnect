<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .robot-avatar {
            position: relative;
            animation: float 3s ease-in-out infinite;
        }

        .robot-head {
            width: 150px;
            height: 120px;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            border-radius: 70px 70px 50px 50px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 35px rgba(79, 70, 229, 0.4);
        }

        .robot-eyes {
            display: flex;
            gap: 25px;
            margin-bottom: 20px;
        }

        .eye {
            width: 30px;
            height: 30px;
            background: white;
            border-radius: 50%;
            position: relative;
            animation: blink 4s ease-in-out infinite;
        }

        .eye::after {
            content: '';
            position: absolute;
            width: 15px;
            height: 15px;
            background: #1e293b;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: look 5s ease-in-out infinite;
        }

        .robot-mouth {
            width: 50px;
            height: 10px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .robot-mouth.talking {
            animation: talk 0.2s ease-in-out infinite;
            background: white;
        }

        .robot-body {
            width: 100px;
            height: 40px;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            border-radius: 20px 20px 40px 40px;
            margin: -10px auto 0;
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes blink {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0.1); }
        }

        @keyframes look {
            0%, 100% { transform: translate(-50%, -50%); }
            25% { transform: translate(-20%, -50%); }
            75% { transform: translate(-80%, -50%); }
        }

        @keyframes talk {
            0%, 100% { height: 10px; transform: scaleX(1); }
            50% { height: 25px; transform: scaleX(1.2); border-radius: 50%; }
        }

        .status-text {
            position: absolute;
            bottom: 20px;
            color: #6366f1;
            font-size: 14px;
            font-weight: 500;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="robot-avatar">
        <div class="robot-head">
            <div class="robot-eyes">
                <div class="eye left"></div>
                <div class="eye right"></div>
            </div>
            <div class="robot-mouth" id="mouth"></div>
        </div>
        <div class="robot-body"></div>
    </div>
    <div class="status-text" id="status">Listening...</div>

    <script>
        const mouth = document.getElementById('mouth');
        const status = document.getElementById('status');

        function setTalking(isTalking) {
            if (isTalking) {
                mouth.classList.add('talking');
            } else {
                mouth.classList.remove('talking');
            }
        }

        function setStatus(text) {
            status.textContent = text;
        }
    </script>
</body>
</html>
